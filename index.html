<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Runden Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
    }

    .display {
      font-size: 2em;
      margin: 8px 0;
    }

    .pace {
      font-size: 2.5em;
      font-weight: bold;
      margin-top: 15px;
    }

    .buttons {
      margin-top: 25px;
    }

    button {
      font-size: 1.2em;
      padding: 12px 18px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
    }

    button:active {
      background: #555;
    }
  </style>
</head>
<body>

  <h1>🏃 Runden Tracker</h1>

  <div class="display" id="time">00:00</div>
  <div class="display" id="laps">Runden: 0</div>
  <div class="display" id="distance">0.00 km</div>
  <div class="pace" id="pace">--:-- /km</div>

  <div class="buttons">
    <button onclick="startStop()">Start / Stop</button>
    <button onclick="lap()">Runde +1</button>
    <button onclick="reset()">Reset</button>
  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let running = false;
    let timer = null;

    let laps = 0;
    const lapDistance = 0.4; // km

    function formatTime(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
      const sec = String(totalSec % 60).padStart(2, '0');
      return min + ":" + sec;
    }

    function updateDisplay() {
      document.getElementById("time").textContent = formatTime(elapsed);
      document.getElementById("laps").textContent = "Runden: " + laps;

      const dist = laps * lapDistance;
      document.getElementById("distance").textContent =
        dist.toFixed(2) + " km";

      if (dist > 0) {
        const paceMinPerKm = (elapsed / 60000) / dist;
        const paceMin = Math.floor(paceMinPerKm);
        const paceSec = Math.round((paceMinPerKm - paceMin) * 60);

        document.getElementById("pace").textContent =
          paceMin + ":" + String(paceSec).padStart(2, '0') + " /km";
      }
    }

    function startStop() {
      if (!running) {
        running = true;
        startTime = Date.now() - elapsed;

        timer = setInterval(() => {
          elapsed = Date.now() - startTime;
          updateDisplay();
        }, 200);

      } else {
        running = false;
        clearInterval(timer);
      }
    }

    function lap() {
      if (!running) return;
      laps++;
      updateDisplay();
    }

    function reset() {
      running = false;
      clearInterval(timer);
      elapsed = 0;
      laps = 0;
      updateDisplay();
    }
  </script>

</body>
</html>
